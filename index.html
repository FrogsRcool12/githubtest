<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Global Counter</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #0f0f1a, #050510);
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 30px;
      color: #00f7ff;
      text-shadow: 0 0 20px #00f7ff;
    }

    #counter {
      font-size: 130px;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 25px rgba(0, 247, 255, 0.4);
      transition: transform 0.1s ease, color 1.5s ease;
    }

    /* 🌈 Animated gradient ONLY for button background */
    button {
      margin-top: 40px;
      padding: 15px 35px;
      font-size: 20px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      cursor: pointer;

      color: white;
      font-weight: bold;

      background: linear-gradient(
        45deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        blue,
        violet,
        red
      );

      background-size: 600% 600%;
      animation: gradientShift 120s ease infinite;

      box-shadow: 0 0 20px rgba(0, 247, 255, 0.3);
      transition: transform 0.1s ease, box-shadow 0.3s ease;
    }

    button:hover {
      box-shadow: 0 0 30px rgba(0, 247, 255, 0.6);
    }

    button:active {
      transform: scale(0.95);
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>

<body>

  <h1>Global Counter</h1>

  <div id="counter">0</div>

  <button id="clickBtn">Click +1</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, updateDoc, increment }
      from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC8ltILkY9xSjrpVvHQugaxB_5iazNKlZI",
      authDomain: "globalnumbertest.firebaseapp.com",
      projectId: "globalnumbertest",
      storageBucket: "globalnumbertest.firebasestorage.app",
      messagingSenderId: "191421221375",
      appId: "1:191421221375:web:68303e4bf7383d7655bfca",
      measurementId: "G-DBVD4ZP2EC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const counterRef = doc(db, "counter", "global");

    const snap = await getDoc(counterRef);
    if (!snap.exists()) {
      await setDoc(counterRef, { value: 0 });
    }

    onSnapshot(counterRef, (docSnap) => {
      document.getElementById("counter").innerText = docSnap.data().value;
    });

    const button = document.getElementById("clickBtn");
    const counterEl = document.getElementById("counter");

    function bounce() {
      counterEl.style.transform = "scale(1.2)";
      setTimeout(() => {
        counterEl.style.transform = "scale(1)";
      }, 120);
    }

    button.addEventListener("mousedown", async () => {
      bounce();
      await updateDoc(counterRef, {
        value: increment(1)
      });
    });

    button.addEventListener("touchstart", async () => {
      bounce();
      await updateDoc(counterRef, {
        value: increment(1)
      });
    });

  </script>

</body>
</html>
