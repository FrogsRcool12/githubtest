<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Global Counter</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #0f0f1a, #050510);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* 🌈 Shared animated gradient */
    .rainbow {
      background: linear-gradient(
        45deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        blue,
        violet,
        red
      );
      background-size: 600% 600%;
      animation: drift 90s linear infinite;

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 30px;
      font-weight: bold;
    }

    #counter {
      font-size: 130px;
      font-weight: bold;
      transition: transform 0.1s ease;
    }

    button {
      margin-top: 40px;
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    /* Make button text also use gradient */
    button.rainbow {
      color: transparent;
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
    }

    @keyframes drift {
      0% { background-position: 0% 50%; }
      100% { background-position: 600% 50%; }
    }

    button:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

  <h1 class="rainbow">Global Counter</h1>

  <div id="counter" class="rainbow">0</div>

  <button id="clickBtn" class="rainbow">Click +1</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, updateDoc, increment }
      from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC8ltILkY9xSjrpVvHQugaxB_5iazNKlZI",
      authDomain: "globalnumbertest.firebaseapp.com",
      projectId: "globalnumbertest",
      storageBucket: "globalnumbertest.firebasestorage.app",
      messagingSenderId: "191421221375",
      appId: "1:191421221375:web:68303e4bf7383d7655bfca",
      measurementId: "G-DBVD4ZP2EC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const counterRef = doc(db, "counter", "global");

    const snap = await getDoc(counterRef);
    if (!snap.exists()) {
      await setDoc(counterRef, { value: 0 });
    }

    onSnapshot(counterRef, (docSnap) => {
      document.getElementById("counter").innerText = docSnap.data().value;
    });

    const button = document.getElementById("clickBtn");
    const counterEl = document.getElementById("counter");

    function bounce() {
      counterEl.style.transform = "scale(1.3)";
      setTimeout(() => {
        counterEl.style.transform = "scale(1)";
      }, 100);
    }

    button.addEventListener("mousedown", async () => {
      bounce();
      await updateDoc(counterRef, {
        value: increment(1)
      });
    });

    button.addEventListener("touchstart", async () => {
      bounce();
      await updateDoc(counterRef, {
        value: increment(1)
      });
    });

  </script>

</body>
</html>
