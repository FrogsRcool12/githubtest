<!DOCTYPE html>
<html>
<head>
  <title>My Cool Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* NAVBAR */
    .navbar {
      background: #222;
      padding: 15px;
      display: flex;
      gap: 20px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
    }

    .navbar a:hover {
      text-decoration: underline;
    }

    /* PAGE CONTENT */
    .container {
      padding: 20px;
    }

    img {
      width: 300px;
      border-radius: 10px;
    }

    /* GAME BUTTON */
    button {
      padding: 10px 15px;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="#">Home</a>
  <a href="#images">Images</a>
  <a href="#game">Game</a>
</div>

<div class="container">

  <h1>Welcome to My Website</h1>
  <p>This is my GitHub Pages site.</p>

  <hr>

  <!-- IMAGES SECTION -->
  <h2 id="images">Images</h2>
  <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Fronalpstock_big.jpg">

  <hr>

  <!-- GAME SECTION -->
  <h2 id="game">Click Game</h2>
  <p>Clicks: <span id="score">0</span></p>

  <button onclick="addPoint()">Click me!</button>

</div>

<script>
  let score = 0;

  function addPoint() {
    score++;
    document.getElementById("score").innerText = score;
  }
</script>

</body>
</html>
